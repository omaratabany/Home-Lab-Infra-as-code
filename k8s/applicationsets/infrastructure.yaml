# k8s/apps/infrastructure.yaml
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infrastructure
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: metallb
            namespace: metallb-system
            repoURL: https://metallb.github.io/metallb
            chart: metallb
            version: 0.14.5
          - name: ingress-nginx
            namespace: ingress-nginx
            repoURL: https://kubernetes.github.io/ingress-nginx
            chart: ingress-nginx
            version: 4.10.0
          - name: cert-manager
            namespace: cert-manager
            repoURL: https://charts.jetstack.io
            chart: cert-manager
            version: v1.14.4
          - name: sealed-secrets
            namespace: sealed-secrets
            repoURL: https://bitnami-labs.github.io/sealed-secrets
            chart: sealed-secrets
            version: 2.15.0
          - name: kube-prometheus-stack
            namespace: monitoring
            repoURL: https://prometheus-community.github.io/helm-charts
            chart: kube-prometheus-stack
            version: 58.2.2
          - name: loki-stack
            namespace: monitoring
            repoURL: https://grafana.github.io/helm-charts
            chart: loki-stack
            version: 2.10.2
            helmValues: |
              loki:
                isDefault: false
  template:
    metadata:
      name: '{{name}}'
    spec:
      project: default
      source:
        repoURL: '{{repoURL}}'
        chart: '{{chart}}'
        targetRevision: '{{version}}'
        helm:
          releaseName: '{{name}}'
          values: '{{helmValues}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true