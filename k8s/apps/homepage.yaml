apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homepage
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://jameswynn.github.io/helm-charts
    chart: homepage
    targetRevision: 1.2.3
    helm:
      releaseName: homepage
      values: |
        env:
          HOMEPAGE_ALLOWED_HOSTS: "home.homelab:31837,home.homelab"
        image:
          repository: ghcr.io/gethomepage/homepage
          tag: latest
        serviceAccount:
          create: true
        enableRbac: true
        config:
          kubernetes:
            mode: cluster
          services:
            - Infrastructure:
                - ArgoCD:
                    href: http://argocd.homelab:31837
                    icon: argocd
                    description: GitOps controller
                - Grafana:
                    href: http://grafana.homelab:31837
                    icon: grafana
                    description: Metrics and dashboards
                - Kubernetes Dashboard:
                    href: http://dashboard.homelab:31837
                    icon: kubernetes-dashboard
                    description: Cluster management
                - Prometheus:
                    href: http://prometheus.homelab:31837
                    icon: prometheus
                    description: Metrics collection
          widgets:
            - kubernetes:
                cluster:
                  show: true
                  cpu: true
                  memory: true
                  showLabel: true
                  label: homelab
                nodes:
                  show: true
                  cpu: true
                  memory: true
                  showLabel: true
  destination:
    server: https://kubernetes.default.svc
    namespace: homepage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true