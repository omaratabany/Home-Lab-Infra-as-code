name: Validate Compose Files

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: docker compose config check
    runs-on: ubuntu-latest

    strategy:
      matrix:
        stack:
          - media-stack
          - productivity
          - automation
          - networking
          - mail
          - utilities

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create stub .env from .env.example
        run: |
          cp docker-compose/${{ matrix.stack }}/.env.example \
             docker-compose/${{ matrix.stack }}/.env

      - name: Validate ${{ matrix.stack }} compose
        run: |
          docker compose \
            -f docker-compose/${{ matrix.stack }}/docker-compose.yml \
            --env-file docker-compose/${{ matrix.stack }}/.env \
            config -q

      - name: Check for secrets accidentally committed
        run: |
          # Fail if any real-looking token patterns are in compose files
          if grep -rE 'eyJ[a-zA-Z0-9]{20,}' docker-compose/${{ matrix.stack }}/docker-compose.yml; then
            echo "ERROR: Possible JWT token found in compose file!"
            exit 1
          fi
