name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    name: Detect leaked secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history for git log scanning

      - name: Install trufflehog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Scan for secrets (trufflehog)
        run: |
          trufflehog filesystem . \
            --only-verified \
            --fail \
            --exclude-paths=.trufflehog-exclude.txt 2>/dev/null || true

      - name: Manual pattern check (JWT tokens, API keys)
        run: |
          echo "Checking for hardcoded JWT tokens..."
          if grep -rE 'eyJ[a-zA-Z0-9+/]{40,}' \
               --include="*.yml" \
               --include="*.yaml" \
               --include="*.env" \
               --exclude="*.example" .; then
            echo "::error::Possible JWT token found in repository!"
            exit 1
          fi
          echo "Checking for hardcoded passwords..."
          if grep -rE '(DB_PASSWORD|POSTGRES_PASSWORD|API_KEY|SECRET_KEY)\s*=\s*[^$\{][a-zA-Z0-9]{8,}' \
               --include="*.yml" \
               --include="*.yaml" \
               --exclude="*.example" .; then
            echo "::error::Possible hardcoded credential found!"
            exit 1
          fi
          echo "All checks passed."

      - name: Verify .env files not committed
        run: |
          if find . -name ".env" -not -name ".env.example" | grep -q .; then
            echo "::error::.env file found in repository! Remove it immediately."
            exit 1
          fi
          echo "No .env files committed. Good."
